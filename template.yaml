AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SentinelStream - AI-Driven Fraud Prevention Lambda

Resources:
  # 1. Define DynamoDB Table
  OrdersTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: orderId
        Type: String

  # 2. Define Lambda Function with DynamoDB Integration
  FraudDetectionFunction:
    Type: AWS::Serverless::Function
    Properties:
      # Reference the compiled JAR generated by Maven
      CodeUri: target/sentinel-stream-0.0.1-SNAPSHOT.jar
      Handler: com.sentinel.sentinel_stream.OrderLambdaHandler::handleRequest
      Runtime: java21
      MemorySize: 2048
      Timeout: 30
      # Add environment variables for DynamoDB Table Name
      Environment:
        Variables:
          TABLE_NAME: !Ref OrdersTable
      Policies:
        - AmazonBedrockFullAccess
        - DynamoDBCrudPolicy: # Grant CRUD permissions for DynamoDB Table
            TableName: !Ref OrdersTable
      Events:
        OrderApi:
          Type: Api
          Properties:
            Path: /submit
            Method: post
Outputs:
  SentinelStreamApi:
    Description: "API Gateway endpoint URL for Prod stage for SentinelStream function"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}://"

