AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SentinelStream - AI-Driven Fraud Prevention (Amazon Nova AI Hackathon Edition)

Resources:
  # 1. Define DynamoDB Table for Transaction Persistence
  OrdersTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: orderId
        Type: String

  # 2. Define an SNS Topic for real-time fraud alerts
  FraudAlertTopic:
    Type: AWS::SNS::Topic

  # 3. Subscribe your email to the alert topic
  MyEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Endpoint: "ma34382940@gmail.com"
      Protocol: email
      TopicArn: !Ref FraudAlertTopic

  # 4. Core Lambda Function (Java 21 + Nova AI Integration)
  FraudDetectionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: target/sentinel-stream-0.0.1-SNAPSHOT.jar
      Handler: com.sentinel.sentinel_stream.OrderLambdaHandler::handleRequest
      Runtime: java21
      MemorySize: 1024
      Timeout: 60
      Tracing: Active # Enable active AWS X-Ray tracing for observability
      Tags: # Add metadata tags for resource management and governance
        Project: SentinelStream
        Event: AmazonNovaAIHackathon
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref FraudAlertTopic
          TABLE_NAME: !Ref OrdersTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - !Sub "arn:aws:bedrock:*:*:*/*nova*"
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt FraudAlertTopic.TopicName
      Events:
        OrderApi:
          Type: Api
          Properties:
            Path: /submit
            Method: post

# 5. Define Outputs to display the API Gateway URL
Outputs:
  SentinelStreamApi:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/submit"

